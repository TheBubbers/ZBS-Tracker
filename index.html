<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zwift Big Spin Check List</title>

<style>
:root {
  --primary: #f5a12c;
  --surface: #ffffff;
  --text-primary: #222;
  --text-secondary: #777;
  --shadow: 0 15px 40px rgba(0,0,0,0.15);
}

* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Roboto, "Segoe UI", sans-serif;
  background: var(--primary);
}

.header {
  text-align: center;
  margin: 40px 0 10px;
  color: white;
  font-size: 32px;
  font-weight: 600;
}

.share-container {
  text-align: center;
  margin-bottom: 30px;
}
.view-toggle {
  position: sticky;
  top: 0;
  z-index: 1000;
  text-align: center;
  padding: 10px 0 20px;
  background: var(--primary);
}

.view-toggle button {
  margin: 0 6px;
}

.view-toggle button.active {
  background: var(--primary);
  color: white;
  border: 2px solid white;
}
button {
  background: white;
  color: var(--primary);
  border: none;
  padding: 10px 18px;
  border-radius: 8px;
  font-weight: 600;
  cursor: pointer;
  transition: 0.2s ease;
}

button:hover { transform: translateY(-2px); }

.container {
  width: 50%;
  margin: 0 auto 80px;
}

#shareNotice {
  display: none;
  text-align: center;
  background: white;
  color: var(--primary);
  padding: 12px;
  font-weight: 600;
  margin-bottom: 20px; 
}

/* Cards */

.year-section {
  background: var(--surface);
  border-radius: 18px;
  margin-bottom: 35px;
  box-shadow: var(--shadow);
  overflow: hidden;
}

.year-image {
  width: 100%;
  height: auto;
  display: block;
  border-radius: 18px 18px 0 0;
}

.year-header {
  padding: 20px;
  cursor: pointer;
}

.year-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.year-title {
  font-size: 20px;
  font-weight: 600;
}

.toggle-collapse {
  font-size: 22px;
  font-weight: 600;
  color: var(--primary);
  width: 30px;
  text-align: center;
}

.progress-bar {
  margin-top: 14px;
  height: 8px;
  background: #eee;
  border-radius: 6px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  width: 0%;
  background: var(--primary);
  transition: width 0.4s ease;
}

.progress-text {
  margin-top: 6px;
  font-size: 13px;
  color: var(--text-secondary);
}

.year-content {
  padding: 0 16px 20px 16px;
}

.year-section.collapsed .year-content {
  display: none;
}

.item {
  display: flex;
  align-items: center;
  padding: 12px 14px;
  border-radius: 10px;
  margin: 6px 0;
  cursor: pointer;
  transition: background 0.2s ease;
}

.item:hover { background: #f8f8f8; }

.toggle {
  width: 22px;
  height: 22px;
  border-radius: 6px;
  border: 2px solid var(--primary);
  margin-right: 14px;
  position: relative;
}

.toggle::after {
  content: "";
  position: absolute;
  width: 10px;
  height: 10px;
  background: var(--primary);
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0);
  transition: transform 0.2s ease;
}

.item.checked .toggle::after {
  transform: translate(-50%, -50%) scale(1);
}

.item.checked .item-text {
  text-decoration: line-through;
  color: var(--text-secondary);
}

/* Modal */

.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  display: none;
  align-items: center;
  justify-content: center;
}

.modal-overlay.active { display: flex; }

.modal-card {
  background: white;
  padding: 25px;
  border-radius: 14px;
  width: 90%;
  max-width: 420px;
  text-align: center;
}

.modal-card input {
  width: 100%;
  padding: 10px;
  border-radius: 6px;
  border: 1px solid #ddd;
  margin: 15px 0;
  font-size: 13px;
}

.modal-actions {
  display: flex;
  gap: 10px;
}

.modal-actions button {
  flex: 1;
}

/* Mobile */

@media (max-width: 900px) {
  .container { width: 90%; }
  .header { font-size: 24px; }
}
</style>
</head>
<body>

<div class="header">Zwift Big Spin Check List</div>



<div id="shareNotice">
Viewing shared progress — changes will not be saved locally.
</div>

<div class="share-container">
  <button onclick="generateShareLink()">Share</button>
  <button onclick="generateExportLink()">Export</button>
</div>

<div class="view-toggle">
  <button id="btn-year" class="active" onclick="setView('year')">By Year</button>
  <button id="btn-type" onclick="setView('type')">By Type</button>
  <button id="btn-route" onclick="setView('route')">By Route</button>
</div>

<div class="container">
  <div id="years"></div>
</div>

<!-- Modal -->
<div id="shareModal" class="modal-overlay">
  <div class="modal-card">
    <h3>Share Link</h3>
    <input id="shareLinkInput" readonly />
    <div class="modal-actions">
      <button onclick="copyShareLink()">Copy</button>
      <button onclick="closeShareModal()">Close</button>
    </div>
  </div>
</div>

<script>

const yearData = {
  "2026": [
    "MX Rider",
    "Big Spin Tri-Spoke",
    "Big Spin Limeade Helmet",
    "Jungle Phones",
    "Rhinestone Rider Kit",
    "Rhinestone Rider Hat",
    "Mayan Camo Kit",
    "Paisley Bandana",
    "Lumberjack Chic Kit",
    "Lumberjack Chic Beanie",
    "Dino-mite Kit",
    "Dino-mite Hard Hat"
  ],
  "2025": [
    "BMX Bandit Bike",
    "Groovy TT Wheels",
    "Sticker Skate Helmet",
    "Big Spin 2025 Headphones",
    "Groovy Tile Kit",
    "Groovy Bucket Hat",
    "Memphis Milano Kit",
    "Granny Visor",
    "Mono Jazz Kit",
    "90s Headphones",
    "Y2K Hacker Kit",
    "Chrome Sunglasses"
  ],
  "2024": [
    "Atomic Cruiser",
    "Tri Spoke and disc wheel",
    "Sky Blue Helmet",
    "Orange Headphones",
    "The Zwift Big Spin Shoes",
    "Classic Crew socks",
    "Makuri Kanji Kit",
    "Makuri Neon Sunglasses",
    "London Punk Kit",
    "Union Jack Bucket Hat",
    "NY Baseball Kit",
    "NY Baseball Cap",
    "Le Tournesol Kit",
    "Le Beret"
  ]
};

const typeData = {
"Bikes": [
    "MX Rider",
    "BMX Bandit Bike",
    "Atomic Cruiser"
],
"Wheels": [
    "Big Spin Tri-Spoke",
    "Groovy TT Wheels",
    "Tri Spoke and disc wheel"
],
"Kits": [
    "Rhinestone Rider Kit",
    "Mayan Camo Kit",
    "Lumberjack Chic Kit",
    "Dino-mite Kit",
    "Groovy Tile Kit",
    "Memphis Milano Kit",
    "Mono Jazz Kit",
    "Y2K Hacker Kit",
    "Makuri Kanji Kit",
    "London Punk Kit",
    "NY Baseball Kit",
    "Le Tournesol Kit"
],
"Headwear": [
    "Big Spin Limeade Helmet",
    "Jungle Phones",
    "Rhinestone Rider Hat",
    "Paisley Bandana",
    "Lumberjack Chic Beanie",
    "Dino-mite Hard Hat",
    "Sticker Skate Helmet",
    "Big Spin 2025 Headphones",
    "Groovy Bucket Hat",
    "Granny Visor",
    "90s Headphones",
    "Sky Blue Helmet",
    "Orange Headphones",
    "Union Jack Bucket Hat",
    "NY Baseball Cap",
    "Le Beret"
],
"Glasses": [
    "Chrome Sunglasses",
    "Makuri Neon Sunglasses"
],
"Footwear": [
    "The Zwift Big Spin Shoes",
    "Classic Crew socks"
]};

const routeData = {
"Flat Out Fast/Mayan San Remo/Southern Coastal Cruise/Sand and Sequoias (All 2026 Routes)":[
    "MX Rider",
    "Big Spin Tri-Spoke",
    "Big Spin Limeade Helmet",
    "Jungle Phones"
],
"Flat Out Fast (2026 Stage 1)":[
    "Rhinestone Rider Kit",
    "Rhinestone Rider Hat"
],
"Mayan San Remo (2026 Stage 2)": [
    "Mayan Camo Kit",
    "Paisley Bandana"
],
"Southern Coastal Cruise (2026 Stage 3)": [
    "Lumberjack Chic Kit",
    "Lumberjack Chic Beanie"
],
"Sand and Sequoias (2026 Stage 4)": [
    "Dino-mite Kit",
    "Dino-mite Hard Hat"
],
"Alpe du Zwift/Epic KOM (Mystery Spinner)": [
    "BMX Bandit Bike",
    "Groovy TT Wheels",
    "Atomic Cruiser",
    "Tri Spoke and disc wheel",
],
"Radio Tower KOM/Volcano KOM (Mystery Spinner)": [
    "Sticker Skate Helmet",
    "Big Spin 2025 Headphones",
    "The Zwift Big Spin Shoes",
    "Classic Crew socks",
    "Sky Blue Helmet",
    "Orange Headphones",

],
"Hilly KOM/Jarvis KOM (Mystery Spinner)": [
    "Groovy Tile Kit",
    "Memphis Milano Kit",
    "Mono Jazz Kit",
    "Y2K Hacker Kit",
    "Makuri Kanji Kit",
    "London Punk Kit",
    "NY Baseball Kit",
    "Le Tournesol Kit",
],
"Volcano Circuit/Stoneway Sprint Reverse (Mystery Spinner)":[
    "Groovy Bucket Hat",
    "Granny Visor",
    "90s Headphones",
    "Chrome Sunglasses",
    "Makuri Neon Sunglasses",
    "Union Jack Bucket Hat",
    "NY Baseball Cap",
    "Le Beret"
]
};
const allItems = [
  ...new Set([
    ...Object.values(yearData).flat(),
    ...Object.values(typeData).flat(),
    ...Object.values(routeData).flat()
  ])
];
let state = {};
let collapsedState = {};
let readOnlyShareMode = false;
let currentView = "year";

/* INIT */

function init(){
  loadState();
  applyURLState();
  render();
}

/* URL Handling */

function applyURLState(){
  const params = new URLSearchParams(window.location.search);

  if(params.has("share")){
    decodeStateCompact(params.get("share"));
    readOnlyShareMode = true;
    document.getElementById("shareNotice").style.display = "block";
  }

if(params.has("export")){
  decodeStateCompact(params.get("export"));
  saveState();

  // Remove export param from URL
  const cleanURL = window.location.origin + window.location.pathname;
  window.history.replaceState({}, document.title, cleanURL);
}
}

/* Rendering */

function render(){
  const container = document.getElementById("years");
  container.innerHTML = "";
const activeData = getActiveData();
Object.keys(activeData).sort((a,b)=> currentView === "year" ? b-a : 0).forEach(sectionKey => {

    const section = document.createElement("div");
    section.className = "year-section";
    if(collapsedState[sectionKey]) section.classList.add("collapsed");

    if(currentView === "year"){const img = document.createElement("img");
    img.className = "year-image";
    img.src = "./zbsBanner" + sectionKey + ".png";
    section.appendChild(img);
}
    const header = document.createElement("div");
    header.className = "year-header";
    header.onclick = () => toggleCollapse(sectionKey);;

    const top = document.createElement("div");
    top.className = "year-top";

    const title = document.createElement("div");
    title.className = "year-title";
    title.innerText = sectionKey;

    const toggle = document.createElement("div");
    toggle.className = "toggle-collapse";
    toggle.innerText = collapsedState[sectionKey] ? "+" : "−";

    top.appendChild(title);
    top.appendChild(toggle);
    header.appendChild(top);

let completed = 0;
activeData[sectionKey].forEach(item => {
  if(state[item]) completed++;
});

    const percent = Math.round((completed / activeData[sectionKey].length) * 100);

    const bar = document.createElement("div");
    bar.className = "progress-bar";
    const fill = document.createElement("div");
    fill.className = "progress-fill";
    fill.style.width = percent + "%";
    bar.appendChild(fill);

    const text = document.createElement("div");
    text.className = "progress-text";
    text.innerText = `${completed}/${activeData[sectionKey].length} completed • ${percent}%`;

    header.appendChild(bar);
    header.appendChild(text);

    section.appendChild(header);

    const content = document.createElement("div");
    content.className = "year-content";

    /* Mark / Clear Controls */

    const controls = document.createElement("div");
    controls.style.textAlign = "right";
    controls.style.margin = "10px 0";

    const markAll = document.createElement("button");
    markAll.innerText = "Mark All";
    markAll.onclick = (e)=>{
      e.stopPropagation();
      if(readOnlyShareMode) return;
      activeData[sectionKey].forEach(item =>
  state[item] = true
);
      saveState();
      render();
    };

    const clearAll = document.createElement("button");
    clearAll.innerText = "Clear All";
    clearAll.style.marginLeft = "10px";
    clearAll.onclick = (e)=>{
      e.stopPropagation();
      if(readOnlyShareMode) return;
      activeData[sectionKey].forEach(item =>
  state[item] = false
);
      saveState();
      render();
    };

    controls.appendChild(markAll);
    controls.appendChild(clearAll);
    content.appendChild(controls);

    /* Items */

    activeData[sectionKey].forEach((item,i)=>{
     const id = item;

      const row = document.createElement("div");
      row.className = "item";
      if(state[id]) row.classList.add("checked");

      row.onclick = (e)=>{
        e.stopPropagation();
        if(readOnlyShareMode) return;
        state[id] = !state[id];
        saveState();
        render();
      };

      const box = document.createElement("div");
      box.className = "toggle";

      const label = document.createElement("div");
      label.className = "item-text";
      label.innerText = item;

      row.appendChild(box);
      row.appendChild(label);
      content.appendChild(row);
    });

    section.appendChild(content);
    container.appendChild(section);
  });
}

/* Storage */

function saveState(){
  localStorage.setItem("bigSpinState", JSON.stringify(state));
}

function loadState(){
  const saved = localStorage.getItem("bigSpinState");
  if(!saved) return;

  const oldState = JSON.parse(saved);
  state = {};

  Object.keys(oldState).forEach(key => {
    if(allItems.includes(key)){
      // New style key, just copy
      state[key] = oldState[key];
    } else {
      // Old style key, like "2025-3"
      const parts = key.split("-");
      if(parts.length === 2){
        const year = parts[0];
        const index = parseInt(parts[1]);
        if(yearData[year] && yearData[year][index]){
          const itemName = yearData[year][index];
          state[itemName] = oldState[key];
        }
      }
    }
  });
}

/* Collapse */

function toggleCollapse(sectionKey){
  collapsedState[sectionKey] = !collapsedState[sectionKey];
  render();
}

/* Share / Export */

function encodeStateCompact() {
  let bits = "";

  allItems.forEach(item => {
    bits += state[item] ? "1" : "0";
  });

  return parseInt(bits || "0", 2).toString(36);
}

function decodeStateCompact(encoded) {
  const binary = parseInt(encoded || "0", 36)
    .toString(2)
    .padStart(allItems.length, "0");

  state = {};

  binary.split("").forEach((bit, i) => {
    if(bit === "1"){
      state[allItems[i]] = true;
    }
  });
}

function generateShareLink(){
  const encoded = encodeStateCompact();
  showModal(`${location.origin}${location.pathname}?share=${encoded}`);
}

function generateExportLink(){
  const encoded = encodeStateCompact();
  showModal(`${location.origin}${location.pathname}?export=${encoded}`);
}

/* Modal */

function showModal(url){
  document.getElementById("shareLinkInput").value = url;
  document.getElementById("shareModal").classList.add("active");
}

function closeShareModal(){
  document.getElementById("shareModal").classList.remove("active");
}

function copyShareLink(){
  const input = document.getElementById("shareLinkInput");
  navigator.clipboard.writeText(input.value).then(()=>{
    closeShareModal();
  });
}
function setView(view){
  currentView = view;

  document.getElementById("btn-year").classList.remove("active");
  document.getElementById("btn-type").classList.remove("active");
  document.getElementById("btn-route").classList.remove("active");

  document.getElementById("btn-" + view).classList.add("active");

  render();
}
function getActiveData() {
  if(currentView === "year") return yearData;
  if(currentView === "type") return typeData;
  if(currentView === "route") return routeData;
}

init();

</script>

</body>
</html>
